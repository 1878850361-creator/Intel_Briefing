name: Daily Intelligence Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京时间 07:51（每天早晨）
  workflow_dispatch:         # 允许手动触发（用于测试）

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install resend

      - name: Generate Morning Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.gptsapi.net/v1/chat/completions
          XAI_MODEL: grok-3
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_mission.py

      - name: Send Email Report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          # RESEND_FROM: ${{ secrets.RESEND_FROM }}  # 有自定义域名时取消注释
        run: python send_email.py
